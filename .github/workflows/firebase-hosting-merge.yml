name: Firebase Hosting Deploy

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      
      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14'

      - name: Login to Firebase
        run: echo $FIREBASE_CI_TOKEN | firebase login:ci --token -
        env:
          FIREBASE_CI_TOKEN: ${{ secrets.FIREBASE_CI_TOKEN }}

      - name: Install project dependencies
        run: npm install
      
      - name: Build project
        run: npm run build
      
      - name: Deploy to Firebase Hosting
        run: firebase deploy --project dexcoder --token ${{ secrets.FIREBASE_CI_TOKEN }}
