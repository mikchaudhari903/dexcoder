name: Firebase Hosting Deploy

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      
      - name: Use Node.js 18.x
        uses: actions/setup-node@v2
        with:
          node-version: '18.x'  # Ensure Node.js version 18.x or higher is used

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Login to Firebase
        run: firebase login:ci --token "${{ secrets.FIREBASE_CI_TOKEN }}"

      - name: Install project dependencies
        run: npm install
      
      - name: Build project
        run: npm run build
      
      - name: Deploy to Firebase Hosting
        run: firebase deploy --project dexcoder --token "${{ secrets.FIREBASE_CI_TOKEN }}"
